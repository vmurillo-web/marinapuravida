[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[redirects]]
  from = "/tracking"
  to = "/#tracking"
  status = 301

[[redirects]]
  from = "/yates"
  to = "/#services"
  status = 301

[[redirects]]
  from = "/tanqueros"
  to = "/#services"
  status = 301

[[redirects]]
  from = "/puertos"
  to = "/#ports"
  status = 301

[[redirects]]
  from = "/contacto"
  to = "/#contact"
  status = 301
